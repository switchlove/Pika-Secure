name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      - run: npm run coverage

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage/lcov.info

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # Fails the build on any moderate+ advisory except the ones explicitly allowlisted in
      # .audit-ci.json — currently the transitive `undici` vuln via discord.js, whose only fix
      # is a breaking discord.js downgrade (tracked instead via Dependabot, see
      # .github/dependabot.yml). Unlike a blanket continue-on-error, this still fails CI if a
      # *new*, unrelated vulnerability shows up in any dependency.
      - name: Audit dependencies
        run: npm run audit

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
